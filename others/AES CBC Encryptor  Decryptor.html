<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AES Encryptor / Decryptor</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
}
h2{ text-align:center; }
textarea{
    width:100%;
    min-height:180px;
    padding:10px;
    font-size:14px;
    box-sizing:border-box;
    margin-top:8px;
    font-family: Consolas, monospace;
}
.box{ margin-bottom:20px; }
.info{
    background:#f5f5f5;
    padding:10px;
    border-radius:6px;
    margin-bottom:20px;
    font-size:14px;
}
.status{
    color:#555;
    font-size:13px;
    margin-top:4px;
    min-height:16px;
}
.settings{
    background:#e8f4f8;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    border:1px solid #b8d4e3;
}
.settings-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}
.settings-header h3{
    margin:0;
    color:#2c5f7c;
}
.settings-row{
    display:flex;
    gap:15px;
    margin-bottom:12px;
    flex-wrap:wrap;
}
.settings-field{
    flex:1;
    min-width:200px;
}
.settings-field label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
    font-size:14px;
}
.settings-field select,
.settings-field input{
    width:100%;
    padding:8px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:4px;
    box-sizing:border-box;
}
.settings-actions{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap: wrap;
}
.btn{
    padding:8px 16px;
    font-size:14px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}
.btn-sm{
    padding:5px 12px;
    font-size:12px;
}
.btn-primary{
    background:#2c5f7c;
    color:white;
}
.btn-primary:hover{
    background:#1e4a5f;
}
.btn-secondary{
    background:#6c757d;
    color:white;
}
.btn-secondary:hover{
    background:#5a6268;
}
.validation-msg{
    color:#d9534f;
    font-size:12px;
    margin-top:4px;
    min-height:16px;
}
.saved-indicator{
    color:#28a745;
    font-size:13px;
    margin-left:10px;
    opacity:0;
    transition:opacity 0.3s;
}
.saved-indicator.show{
    opacity:1;
}
.hidden{
    display:none;
}
</style>
</head>
<body>

<h2>AES CBC Encryptor / Decryptor</h2>

<div class="info">
    Uses the native <b>Web Crypto API</b> (AES-CBC, PKCS7 padding) — works smoothly even with very large inputs.
</div>

<div class="settings">
    <div class="settings-header">
        <h3>Crypto Settings</h3>
        <button id="toggleSettings" class="btn btn-secondary btn-sm">Hide Settings</button>
    </div>
    
    <div id="settingsContent">
        <div class="settings-row">
            <div class="settings-field">
                <label for="keySize">Key Size (Bits)</label>
                <select id="keySize">
                    <option value="128">128 bits (16 bytes)</option>
                    <option value="192">192 bits (24 bytes)</option>
                    <option value="256">256 bits (32 bytes)</option>
                </select>
            </div>
        </div>
        
        <div class="settings-row">
            <div class="settings-field">
                <label for="secretKey">Secret Key</label>
                <input type="text" id="secretKey" placeholder="Enter your secret key">
                <div class="validation-msg" id="keyValidation"></div>
            </div>
            
            <div class="settings-field">
                <label for="iv">Initialization Vector (IV)</label>
                <input type="text" id="iv" placeholder="16 bytes (16 characters)">
                <div class="validation-msg" id="ivValidation"></div>
            </div>
        </div>
        
        <div class="settings-actions">
            <button class="btn btn-primary" id="saveSettings">Save Settings</button>
            <button class="btn btn-secondary" id="clearSettings">Clear Settings</button>
            <span class="saved-indicator" id="savedIndicator">✓ Settings saved locally</span>
        </div>
    </div>
</div>

<div class="box">
    <label><b>Plain Text</b></label>
    <textarea id="plainText" placeholder="Type plain text here..."></textarea>
    <div class="status" id="statusPlain"></div>
</div>

<div class="box">
    <label><b>Encrypted Text (Base64)</b></label>
    <textarea id="encryptedText" placeholder="Encrypted text appears here..."></textarea>
    <div class="status" id="statusEnc"></div>
</div>

<div class="box">
    <label><b>Decrypted Output</b></label>
    <textarea id="decryptedOutput" readonly></textarea>
</div>

<script>
/* ---------- DOM Elements ---------- */
const keySizeSelect   = document.getElementById("keySize");
const secretKeyInput  = document.getElementById("secretKey");
const ivInput         = document.getElementById("iv");
const keyValidation   = document.getElementById("keyValidation");
const ivValidation    = document.getElementById("ivValidation");
const saveBtn         = document.getElementById("saveSettings");
const clearBtn        = document.getElementById("clearSettings");
const savedIndicator  = document.getElementById("savedIndicator");

const toggleSettingsBtn = document.getElementById("toggleSettings");
const settingsContent   = document.getElementById("settingsContent");

const plainText       = document.getElementById("plainText");
const encryptedText   = document.getElementById("encryptedText");
const decryptedOutput = document.getElementById("decryptedOutput");
const statusPlain     = document.getElementById("statusPlain");
const statusEnc       = document.getElementById("statusEnc");

/* ---------- Crypto State ---------- */
const encoder = new TextEncoder();
const decoder = new TextDecoder();

let cryptoKey = null;
let ivBytes = null;
let currentKeySize = 128;

/* ---------- LocalStorage Keys ---------- */
const STORAGE_KEYS = {
    KEY_SIZE: 'aes_key_size',
    SECRET_KEY: 'aes_secret_key',
    IV: 'aes_iv',
    SETTINGS_VISIBLE: 'aes_settings_visible'
};

/* ---------- Validation ---------- */
function validateKeySize(keySize, keyLength){
    const expectedBytes = keySize / 8;
    if (keyLength !== expectedBytes){
        return `Key must be exactly ${expectedBytes} bytes (${keySize} bits). Current: ${keyLength} bytes.`;
    }
    return null;
}

function validateIV(ivLength){
    if (ivLength !== 16){
        return `IV must be exactly 16 bytes. Current: ${ivLength} bytes.`;
    }
    return null;
}

function updateValidation(){
    const keySize = parseInt(keySizeSelect.value);
    const key = secretKeyInput.value;
    const iv = ivInput.value;
    
    const keyBytes = encoder.encode(key);
    const ivBytesArr = encoder.encode(iv);
    
    const keyError = validateKeySize(keySize, keyBytes.length);
    const ivError = validateIV(ivBytesArr.length);
    
    keyValidation.textContent = keyError || '';
    ivValidation.textContent = ivError || '';
    
    return !keyError && !ivError;
}

/* ---------- Crypto Initialization ---------- */
async function initCrypto(){
    if (!updateValidation()){
        cryptoKey = null;
        ivBytes = null;
        return false;
    }
    
    try {
        const keySize = parseInt(keySizeSelect.value);
        const key = secretKeyInput.value;
        const iv = ivInput.value;
        
        const keyBytes = encoder.encode(key);
        ivBytes = encoder.encode(iv);
        
        cryptoKey = await crypto.subtle.importKey(
            "raw",
            keyBytes,
            { name: "AES-CBC" },
            false,
            ["encrypt", "decrypt"]
        );
        
        currentKeySize = keySize;
        return true;
    } catch (err){
        console.error("Crypto initialization failed:", err);
        alert("Failed to initialize crypto: " + err.message);
        return false;
    }
}

/* ---------- LocalStorage Functions ---------- */
function saveSettings(){
    if (!updateValidation()){
        alert("Please fix validation errors before saving.");
        return;
    }
    
    localStorage.setItem(STORAGE_KEYS.KEY_SIZE, keySizeSelect.value);
    localStorage.setItem(STORAGE_KEYS.SECRET_KEY, secretKeyInput.value);
    localStorage.setItem(STORAGE_KEYS.IV, ivInput.value);
    
    showSavedIndicator();
}

function loadSettings(){
    const savedKeySize = localStorage.getItem(STORAGE_KEYS.KEY_SIZE);
    const savedKey = localStorage.getItem(STORAGE_KEYS.SECRET_KEY);
    const savedIV = localStorage.getItem(STORAGE_KEYS.IV);
    
    if (savedKeySize) keySizeSelect.value = savedKeySize;
    if (savedKey) secretKeyInput.value = savedKey;
    if (savedIV) ivInput.value = savedIV;
    
    updateValidation();
}

function clearSettings(){
    if (confirm("Are you sure you want to clear all saved settings?")){
        localStorage.removeItem(STORAGE_KEYS.KEY_SIZE);
        localStorage.removeItem(STORAGE_KEYS.SECRET_KEY);
        localStorage.removeItem(STORAGE_KEYS.IV);
        
        keySizeSelect.value = "128";
        secretKeyInput.value = "";
        ivInput.value = "";
        
        updateValidation();
        cryptoKey = null;
        ivBytes = null;
    }
}

function showSavedIndicator(){
    savedIndicator.classList.add('show');
    setTimeout(() => {
        savedIndicator.classList.remove('show');
    }, 2000);
}

/* ---------- Settings Visibility State ---------- */
function loadSettingsVisibility() {
    const isVisible = localStorage.getItem(STORAGE_KEYS.SETTINGS_VISIBLE);
    // Default to visible if not explicitly set to false
    if (isVisible === 'false') {
        settingsContent.classList.add("hidden");
        toggleSettingsBtn.textContent = "Show Settings";
    } else {
        settingsContent.classList.remove("hidden");
        toggleSettingsBtn.textContent = "Hide Settings";
    }
}

/* ---------- Base64 helpers (binary-safe) ---------- */
function bytesToBase64(bytes){
    let binary = "";
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize){
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
    }
    return btoa(binary);
}

function base64ToBytes(b64){
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++){
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

/* ---------- Encrypt / Decrypt ---------- */
async function encrypt(text){
    if (!cryptoKey || !ivBytes){
        throw new Error("Crypto not initialized. Please check your settings.");
    }
    
    const data = encoder.encode(text);
    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-CBC", iv: ivBytes },
        cryptoKey,
        data
    );
    return bytesToBase64(new Uint8Array(encrypted));
}

async function decrypt(b64){
    try{
        if (!cryptoKey || !ivBytes){
            return "";
        }
        
        const bytes = base64ToBytes(b64);
        const decrypted = await crypto.subtle.decrypt(
            { name: "AES-CBC", iv: ivBytes },
            cryptoKey,
            bytes
        );
        return decoder.decode(decrypted);
    }catch(e){
        return "";
    }
}

/* ---------- Debounce helper ---------- */
function debounce(fn, delay){
    let t = null;
    return function(...args){
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, args), delay);
    };
}

/* ---------- UI wiring ---------- */
const runEncrypt = debounce(async () => {
    const value = plainText.value;
    if (value === ""){
        encryptedText.value = "";
        decryptedOutput.value = "";
        statusPlain.textContent = "";
        return;
    }
    
    if (!cryptoKey){
        statusPlain.textContent = "⚠ Please configure and save valid crypto settings first.";
        return;
    }
    
    statusPlain.textContent = "Encrypting...";
    const t0 = performance.now();
    
    try {
        const enc = await encrypt(value);
        const dt = (performance.now() - t0).toFixed(1);
        encryptedText.value = enc;
        decryptedOutput.value = value;
        statusPlain.textContent = `Encrypted ${value.length} chars in ${dt} ms`;
    } catch (err){
        statusPlain.textContent = "⚠ Encryption failed: " + err.message;
    }
}, 250);

const runDecrypt = debounce(async () => {
    const value = encryptedText.value.trim();
    if (value === ""){
        decryptedOutput.value = "";
        statusEnc.textContent = "";
        return;
    }
    
    if (!cryptoKey){
        statusEnc.textContent = "⚠ Please configure and save valid crypto settings first.";
        return;
    }
    
    statusEnc.textContent = "Decrypting...";
    const t0 = performance.now();
    const dec = await decrypt(value);
    const dt = (performance.now() - t0).toFixed(1);
    decryptedOutput.value = dec || "(invalid ciphertext / padding error)";
    statusEnc.textContent = `Decrypted in ${dt} ms`;
}, 250);

plainText.addEventListener("input", runEncrypt);
encryptedText.addEventListener("input", runDecrypt);

/* ---------- Settings Event Listeners ---------- */
keySizeSelect.addEventListener("change", updateValidation);
secretKeyInput.addEventListener("input", updateValidation);
ivInput.addEventListener("input", updateValidation);

saveBtn.addEventListener("click", async () => {
    saveSettings();
    const success = await initCrypto();
    if (success){
        // Re-run encryption/decryption if there's existing data
        if (plainText.value) runEncrypt();
        if (encryptedText.value) runDecrypt();
    }
});

clearBtn.addEventListener("click", () => {
    clearSettings();
    cryptoKey = null;
    ivBytes = null;
});

/* ---------- Toggle Settings Visibility ---------- */
toggleSettingsBtn.addEventListener("click", () => {
    const isHidden = settingsContent.classList.toggle("hidden");
    toggleSettingsBtn.textContent = isHidden ? "Show Settings" : "Hide Settings";
    
    // Save visibility state to localStorage
    localStorage.setItem(STORAGE_KEYS.SETTINGS_VISIBLE, !isHidden);
});

/* ---------- Boot ---------- */
loadSettingsVisibility(); // Remember if settings were hidden
loadSettings();
initCrypto().catch(err => {
    console.error("Failed to init crypto key:", err);
});
</script>

</body>
</html>
